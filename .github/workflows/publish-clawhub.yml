name: Publish to ClawHub

# ════════════════════════════════════════════════════════════════════════════════
# INTENT: Publish SQL Connector skill to clawhub.ai
# 
# TRIGGER: Only on merge to 'publish' branch (not development)
#
# FLOW:
#   1. User: PR main → publish branch
#   2. GitHub: Run this workflow
#   3. Verify tests passed (no direct publishes from broken code)
#   4. Install clawhub CLI
#   5. Authenticate with CLAWHUB_PUBLISH_TOKEN secret
#   6. Run: clawhub publish
#   7. Create GitHub Release (for users to see what changed)
#   8. Report: Success / Failure
#
# SECURITY:
#   - Token is GitHub secret (encrypted at rest, masked in logs)
#   - Only triggered on publish branch (explicit, not accidental)
#   - Tests must pass before merge to main (upstream CI requirement)
#   - Workflow cannot be triggered from development (branch policy)
#
# DEPENDENCY_PRIORITY:
#   - SQL Connector (pymssql) is dependency-heavy: requires TDS driver
#   - CI tests mock database connections (no live SQL Server needed)
#   - Users installing via clawhub also get pymssql + python-dotenv
#
# NOTE FOR SETUP:
#   Before running this workflow, you must:
#   1. Add CLAWHUB_PUBLISH_TOKEN to GitHub repo settings:
#      Settings → Secrets and variables → Actions → New repository secret
#      Name: CLAWHUB_PUBLISH_TOKEN
#      Value: [Your clawhub.ai API token from account settings]
#   2. Token is used ONLY for clawhub CLI authentication
# ════════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - publish  # CRITICAL: ONLY publish branch triggers this workflow
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Verify: Tests passed on main before publishing
  # ─────────────────────────────────────────────────────────────────────────────
  verify-tests:
    name: "Verify CI passed on main"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Check test status on main (not publish)

      - name: "Verify main branch exists"
        run: |
          git fetch origin main
          echo "✅ Main branch verified"

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pyyaml
          pip install pymssql python-dotenv

      - name: "Run tests (verify passing)"
        run: |
          pytest tests/ -v --tb=short --cov --cov-fail-under=45
        env:
          SQL_CLOUD_SERVER: "mock"
          SQL_LOCAL_SERVER: "mock"

      - name: "✅ Tests passed — safe to publish"
        run: |
          echo "Tests passed. Proceeding to publication step."

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish: Run clawhub publish to clawhub.ai
  # ─────────────────────────────────────────────────────────────────────────────
  publish-to-clawhub:
    name: "Publish skill to clawhub.ai"
    runs-on: ubuntu-latest
    needs: [verify-tests]  # Only run if tests pass

    steps:
      - uses: actions/checkout@v4
        with:
          ref: publish

      - name: "Install clawhub CLI"
        run: |
          echo "Installing clawhub CLI..."
          npm install -g @clawhub/cli 2>/dev/null || npm install -g clawhub-cli
          clawhub --version

      - name: "Validate skill metadata"
        run: |
          echo "Validating openclaw.skill.json..."
          
          # Check file exists
          if [ ! -f "openclaw.skill.json" ]; then
            echo "❌ openclaw.skill.json not found"
            exit 1
          fi
          
          # Validate JSON syntax
          if ! python3 -m json.tool openclaw.skill.json > /dev/null 2>&1; then
            echo "❌ openclaw.skill.json is not valid JSON"
            exit 1
          fi
          
          echo "✅ JSON syntax valid"
          
          # Check required fields
          python3 << 'PYTHON_SCRIPT'
import json
with open('openclaw.skill.json', 'r') as f:
    data = json.load(f)

required = ['id', 'name', 'version', 'description', 'license']
missing = [field for field in required if field not in data]

if missing:
    print(f"❌ Missing required fields: {', '.join(missing)}")
    exit(1)

print(f"✅ Skill metadata valid: {data['name']} v{data['version']}")
PYTHON_SCRIPT

      - name: "Authenticate with clawhub.ai"
        run: |
          echo "Configuring clawhub authentication..."
          # Export token for clawhub CLI (exact variable name varies by CLI)
          export CLAWHUB_TOKEN="${{ secrets.CLAWHUB_PUBLISH_TOKEN }}"
          # Verify token is set (masked in logs)
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "❌ CLAWHUB_PUBLISH_TOKEN secret not configured"
            echo "   Add via: GitHub Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name: CLAWHUB_PUBLISH_TOKEN"
            echo "   Value: [Your token from clawhub.ai account settings]"
            exit 1
          fi
          echo "✅ Token configured (masked in logs)"

      - name: "Publish SQL Connector skill"
        run: |
          export CLAWHUB_TOKEN="${{ secrets.CLAWHUB_PUBLISH_TOKEN }}"
          echo "Publishing to clawhub.ai..."
          # Navigate to skill directory and publish
          cd . # already at root where skill files are
          
          # Run clawhub publish and capture both exit code and output
          if clawhub publish --token "$CLAWHUB_TOKEN" 2>&1 | tee /tmp/publish.log; then
            PUBLISH_EXIT_CODE=$?
            echo "✅ clawhub publish completed successfully (exit code: $PUBLISH_EXIT_CODE)"
          else
            PUBLISH_EXIT_CODE=$?
            echo "❌ clawhub publish failed (exit code: $PUBLISH_EXIT_CODE)"
            echo "Logs:"
            cat /tmp/publish.log
            exit 1
          fi
          
          # Secondary verification: check output for success indicators
          if grep -qi "success\|published\|uploaded" /tmp/publish.log; then
            echo "✅ Output contains success indicators"
          else
            echo "⚠️ Output did not contain success indicators (may still have succeeded)"
          fi

      - name: "Create GitHub Release"
        run: |
          # Extract version from openclaw.skill.json
          VERSION=$(grep -m1 '"version":' openclaw.skill.json | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' || echo "latest")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${COMMIT_HASH}"
          
          echo "Creating GitHub Release: $TAG"
          
          gh release create "$TAG" \
            --target publish \
            --title "Release: SQL Connector $VERSION" \
            --notes "Automated publication to clawhub.ai. Commit: $COMMIT_HASH" \
            --draft=false 2>/dev/null || echo "Release already exists or gh not available"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Report: Publication successful"
        if: success()
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║  ✅ SQL Connector published to clawhub.ai                   ║"
          echo "╠═════════════════════════════════════════════════════════════╣"
          echo "║  Users can now install:                                     ║"
          echo "║    clawhub install sql-connector@latest                     ║"
          echo "║    clawhub install sql-connector@latest --update            ║"
          echo "║                                                             ║"
          echo "║  View on clawhub.ai:                                        ║"
          echo "║    https://clawhub.ai/skills/sql-connector                  ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""

      - name: "Report: Publication failed"
        if: failure()
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║  ❌ Publication failed                                       ║"
          echo "╠═════════════════════════════════════════════════════════════╣"
          echo "║  Check logs above for errors.                               ║"
          echo "║  Common issues:                                             ║"
          echo "║  1. CLAWHUB_PUBLISH_TOKEN secret not configured             ║"
          echo "║  2. Token expired or invalid                                ║"
          echo "║  3. Network error (retry workflow)                          ║"
          echo "║  4. Skill metadata incomplete (check openclaw.skill.json)    ║"
          echo "║                                                             ║"
          echo "║  Action: Fix and re-run workflow (workflow_dispatch)         ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          exit 1
