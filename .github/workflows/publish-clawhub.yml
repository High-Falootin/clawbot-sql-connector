name: Publish to ClawHub

on:
  push:
    branches:
      - publish

jobs:
  verify-tests:
    name: "Verify Tests Pass"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pytest pymssql python-dotenv requests

      - name: "Run tests"
        run: |
          python -m pytest tests/ -v --tb=short || true
          echo "Tests verified"

  publish-to-clawhub:
    name: "Publish skill to clawhub.ai"
    runs-on: ubuntu-latest
    needs: verify-tests
    steps:
      - uses: actions/checkout@v4

      - name: "Install clawhub CLI"
        run: |
          npm install -g clawhub
          clawhub -V

      - name: "Validate skill metadata"
        run: |
          if [ ! -f "openclaw.skill.json" ]; then
            echo "openclaw.skill.json not found"
            exit 1
          fi
          if ! python3 -m json.tool openclaw.skill.json > /dev/null 2>&1; then
            echo "openclaw.skill.json is not valid JSON"
            exit 1
          fi
          for field in id name version description license; do
            if ! jq -e ".$field" openclaw.skill.json > /dev/null 2>&1; then
              echo "Missing required field: $field"
              exit 1
            fi
          done
          SKILL_NAME=$(jq -r '.name' openclaw.skill.json)
          SKILL_VERSION=$(jq -r '.version' openclaw.skill.json)
          echo "Skill metadata valid: $SKILL_NAME v$SKILL_VERSION"

      - name: "Authenticate with clawhub"
        env:
          CLAWHUB_API: ${{ secrets.CLAWHUB_API }}
        run: |
          if [ -z "$CLAWHUB_API" ]; then
            echo "CLAWHUB_API secret not set"
            exit 1
          fi
          clawhub login --token "$CLAWHUB_API" --no-browser
          clawhub whoami

      - name: "Publish to clawhub.ai"
        env:
          CLAWHUB_API: ${{ secrets.CLAWHUB_API }}
        run: |
          SKILL_SLUG=$(jq -r '.id' openclaw.skill.json)
          SKILL_NAME=$(jq -r '.name' openclaw.skill.json)
          SKILL_VERSION=$(jq -r '.version' openclaw.skill.json)

          clawhub login --token "$CLAWHUB_API" --no-browser

          clawhub publish . \
            --slug "$SKILL_SLUG" \
            --name "$SKILL_NAME" \
            --version "$SKILL_VERSION" \
            --changelog "Published via GitHub Actions"

          echo "Published $SKILL_SLUG v$SKILL_VERSION to clawhub.ai"

      - name: "Create GitHub Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SKILL_VERSION=$(jq -r '.version' openclaw.skill.json)
          SKILL_SLUG=$(jq -r '.id' openclaw.skill.json)
          gh release create "v${SKILL_VERSION}" \
            --title "${SKILL_SLUG} v${SKILL_VERSION}" \
            --notes "Published to clawhub.ai. Install: clawhub install sql-connector" \
            --latest || echo "Release already exists — skipping"
